name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: test-groq-key
          COHERE_API_KEY: test-cohere-key
          TAVILY_API_KEY: test-tavily-key
          LANGFUSE_PUBLIC_KEY: test-langfuse-public-key
          LANGFUSE_SECRET_KEY: test-langfuse-secret-key
          LANGFUSE_HOST: https://cloud.langfuse.com
          GROQ_MODEL: llama-3.1-8b-instant
        run: pytest tests/ -q

      - name: Run lint
        run: ruff check .

      - name: Smoke test graph import
        env:
          GROQ_API_KEY: test-groq-key
          COHERE_API_KEY: test-cohere-key
          TAVILY_API_KEY: test-tavily-key
          LANGFUSE_PUBLIC_KEY: test-langfuse-public-key
          LANGFUSE_SECRET_KEY: test-langfuse-secret-key
          GROQ_MODEL: llama-3.1-8b-instant
        run: python -c "from agent.graph import build_graph; print('ok')"

      - name: Docker build test
        run: docker build -t agent-test .
